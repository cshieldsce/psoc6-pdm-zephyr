# psoc6-pdm-zephyr
# prj.conf : Zephyr Kconfig for the PDM example application

# Core
CONFIG_MULTITHREADING=y
CONFIG_STD_C23=y

# Logging - use immediate mode so log messages from early init
# (before the logging thread is scheduled) are not dropped.
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_DEFAULT_LEVEL=3     # 3 = INF; set to 4 for DBG verbosity
CONFIG_PRINTK=y

# Console / UART (KitProg3 CDC on SCB5)
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# GPIO (LED heartbeat on P5.3, user button on P5.2)
CONFIG_GPIO=y

# Watchdog (board defconfig enables it; keep it on)
CONFIG_WATCHDOG=y

# Networking not needed for this standalone audio example
CONFIG_NETWORKING=n

# Heap size for dynamic allocation (audio buffers, logging infrastructure).
# 8 KB is sufficient for 1600-sample int16 frames + log backend.
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Main thread stack. Default (1 KB) is too small when the audio loop
# calls LOG_INF with formatted strings on every frame. 4 KB is safe.
CONFIG_MAIN_STACK_SIZE=4096

# HW_STACK_PROTECTION is not supported on this SoC (PSoC6 CAT1A), so MPU
# is disabled to avoid unsatisfied Kconfig dependency warnings at build time.
CONFIG_ARM_MPU=n
